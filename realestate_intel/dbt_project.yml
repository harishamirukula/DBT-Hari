name: 'realestate_intel'
version: '1.0.0'
config-version: 2

profile: 'realestate_intel'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  realestate_intel:
    staging:
      +materialized: view
      +schema: realestate_staging
    intermediate:
      +materialized: view
      +schema: realestate_intermediate
    marts:
      +materialized: table
      +schema: realestate_marts
